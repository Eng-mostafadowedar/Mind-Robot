<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - MindRobot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../master.css" />
  <link rel="stylesheet" href="../header/header.css?v=2" />
  <script src="../header/header.js?v=2" defer></script>
  <style>
    .admin-container { padding: 20px 20px 40px; max-width: 600px; margin: 0 auto; }
    .login-section { text-align: center; padding-top: 60px; }
    .login-icon { width: 80px; height: 80px; background: rgba(0,239,139,0.08); border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 32px; }
    .login-section h2 { font-family: var(--app-font); font-size: var(--app-fz-xl); font-weight: 700; color: var(--fg); margin: 0 0 8px; }
    .login-section p { font-family: var(--app-font); font-size: var(--app-fz-sm); color: var(--muted); margin-bottom: 24px; }
    .login-form { text-align: left; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-family: var(--app-font); font-size: var(--app-fz-sm); font-weight: 600; color: var(--fg); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--stroke); background: var(--panel); color: var(--fg); font-family: var(--app-font); font-size: var(--app-fz-md); outline: none; transition: border-color 0.2s ease; box-sizing: border-box; }
    .form-group input:focus { border-color: rgba(0,239,139,0.5); }
    .login-btn { width: 100%; padding: 16px; border-radius: var(--radius-md); border: none; background: var(--accent); color: #000; font-family: var(--app-font); font-size: var(--app-fz-md); font-weight: 700; cursor: pointer; transition: opacity 0.2s ease; }
    .login-btn:hover { opacity: 0.8; }
    .login-error { color: var(--danger); font-size: var(--app-fz-sm); margin-top: 12px; min-height: 20px; font-family: var(--app-font); display: none; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 16px; }
    .panel-title { font-family: var(--app-font); font-size: var(--app-fz-xl); font-weight: 700; color: var(--fg); display: flex; align-items: center; gap: 12px; }
    .panel-title i { color: var(--accent); }
    .logout-btn { padding: 12px 24px; border-radius: var(--radius-md); border: 1px solid var(--danger); background: transparent; color: var(--danger); font-family: var(--app-font); font-size: var(--app-fz-sm); font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
    .logout-btn:hover { background: var(--danger); color: #fff; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--panel); border: 1px solid var(--stroke); border-radius: var(--radius-xl); padding: 20px; text-align: center; }
    .stat-card .stat-value { font-family: var(--app-font); font-size: 36px; font-weight: 800; color: var(--fg); margin-bottom: 4px; }
    .stat-card .stat-label { font-family: var(--app-font); font-size: var(--app-fz-sm); color: var(--muted); }
    .actions-section { margin-top: 24px; }
    .actions-section h3 { font-family: var(--app-font); font-size: var(--app-fz-lg); font-weight: 700; color: var(--fg); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .actions-section h3 i { color: var(--accent); }
    .action-btn { width: 100%; padding: 14px; border-radius: var(--radius-md); border: 1px solid var(--stroke); background: var(--panel); color: var(--fg); font-family: var(--app-font); font-size: var(--app-fz-md); font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; box-sizing: border-box; }
    .action-btn:hover { border-color: var(--accent-border); background: rgba(0,239,139,0.05); }
    .action-btn .btn-icon { font-size: 18px; width: 24px; color: var(--accent); flex-shrink: 0; }
    .action-btn .btn-text { flex: 1; text-align: left; }
    .action-btn .btn-arrow { font-size: 12px; color: var(--muted); }
    .patients-section { margin-top: 32px; }
    .patients-section h3 { font-family: var(--app-font); font-size: var(--app-fz-lg); font-weight: 700; color: var(--fg); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .patients-section h3 i { color: var(--accent); }
    .pat-table-wrap { overflow-x: auto; border: 1px solid var(--stroke); border-radius: var(--radius-md); background: var(--panel); }
    .pat-table { width: 100%; border-collapse: collapse; font-family: var(--app-font); }
    .pat-table thead th { background: rgba(0,239,139,0.08); padding: 12px 16px; font-size: var(--app-fz-sm); font-weight: 600; color: var(--fg); text-align: left; border-bottom: 1px solid var(--stroke); }
    .pat-table tbody tr { border-bottom: 1px solid var(--stroke); transition: background 0.1s; }
    .pat-table tbody tr:hover { background: rgba(0,239,139,0.04); }
    .pat-table td { padding: 12px 16px; font-size: var(--app-fz-sm); color: var(--fg); text-align: left; }
    .pat-table .pat-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: var(--radius-sm); transition: all 0.2s ease; }
    .pat-table .pat-delete:hover { background: var(--danger); color: #fff; }
    .pat-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-family: var(--app-font); font-size: var(--app-fz-sm); display: none; }
    .pat-empty i { font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.3; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: rgba(0,239,139,0.9); color: #000; border-radius: var(--radius-md); font-family: var(--app-font); font-size: var(--app-fz-sm); font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .toast.show { opacity: 1; }
    .confirm-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(7,10,20,0.85); backdrop-filter: blur(8px); z-index: 9998; align-items: center; justify-content: center; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: linear-gradient(180deg, rgba(20,24,50,0.99), rgba(11,18,48,0.98)); border: 1px solid var(--stroke); border-radius: var(--radius-xl); padding: 32px; width: 400px; max-width: 100%; text-align: center; }
    .confirm-box p { font-family: var(--app-font); font-size: var(--app-fz-md); color: var(--fg); margin-bottom: 24px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    .confirm-cancel { padding: 12px 24px; border-radius: var(--radius-md); border: 1px solid var(--stroke); background: transparent; color: var(--fg); font-family: var(--app-font); font-size: var(--app-fz-sm); font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .confirm-cancel:hover { background: var(--stroke); }
    .confirm-delete { padding: 12px 24px; border-radius: var(--radius-md); border: none; background: var(--danger); color: #fff; font-family: var(--app-font); font-size: var(--app-fz-sm); font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .confirm-delete:hover { opacity: 0.8; }
    @media (max-width: 400px) { .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app" class="app-shell">
    <div id="header-container"></div>
    <main class="workspace">
      <div class="admin-container">
        <div class="login-section" id="loginSection">
          <div class="login-icon"><i class="fas fa-shield-alt"></i></div>
          <h2 data-i18n="adminLogin">Admin Login</h2>
          <p data-i18n="loginSubtitle">Enter password to access the admin panel</p>
          <div class="login-form">
            <div class="form-group">
              <label data-i18n="passwordLabel">Password</label>
              <input type="password" id="passInput" placeholder="****" autocomplete="off" />
            </div>
            <button class="login-btn" id="loginBtn" data-i18n="loginBtn">Login</button>
            <div class="login-error" id="loginError"></div>
          </div>
        </div>
        <div class="admin-panel" id="adminPanel">
          <div class="panel-header">
            <div class="panel-title"><i class="fas fa-shield-alt"></i> <span data-i18n="adminPanel">Admin Panel</span></div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span></button>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalPatients">0</div><div class="stat-label" data-i18n="totalPatients">Total Patients</div></div>
            <div class="stat-card"><div class="stat-value" id="totalVisits">0</div><div class="stat-label" data-i18n="totalVisits">Total Visits</div></div>
          </div>
          <div class="actions-section">
            <h3><i class="fas fa-tools"></i> <span data-i18n="quickActions">Quick Actions</span></h3>
            <button class="action-btn" id="btnHome"><div class="btn-icon"><i class="fas fa-home"></i></div><span class="btn-text" data-i18n="goToFrontP1">Go to Front Page</span><i class="fas fa-chevron-right btn-arrow"></i></button>
            <button class="action-btn" id="btnHistory"><div class="btn-icon"><i class="fas fa-history"></i></div><span class="btn-text" data-i18n="viewHistory">View Patient History</span><i class="fas fa-chevron-right btn-arrow"></i></button>
            <button class="action-btn" id="btnExport"><div class="btn-icon"><i class="fas fa-file-csv"></i></div><span class="btn-text" data-i18n="exportCsv">Export All Data (CSV)</span><i class="fas fa-download btn-arrow"></i></button>
            <button class="action-btn" id="btnDeleteAll" style="border-color:var(--danger);color:var(--danger);"><div class="btn-icon" style="color:var(--danger)"><i class="fas fa-trash"></i></div><span class="btn-text" data-i18n="deleteAll">Delete All Data</span><i class="fas fa-chevron-right btn-arrow"></i></button>
          </div>
          <div class="patients-section">
            <h3><i class="fas fa-users"></i> <span data-i18n="registeredPatients">Registered Patients</span></h3>
            <div class="pat-table-wrap">
              <table class="pat-table"><thead><tr>
                <th data-i18n="thName">Name</th>
                <th data-i18n="thDate">Date</th>
                <th data-i18n="thAction">Action</th>
              </tr></thead>
              <tbody id="patientsBody"></tbody></table>
              <div class="pat-empty" id="patTableEmpty"><i class="fas fa-user-slash"></i><span data-i18n="noPatients">No patients yet</span></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="confirm-overlay" id="confirmModal">
    <div class="confirm-box">
      <p data-i18n="confirmDelete">Are you sure you want to DELETE ALL patient data? This cannot be undone.</p>
      <div class="confirm-btns">
        <button class="confirm-cancel" id="confirmCancelBtn" data-i18n="cancelBtn">Cancel</button>
        <button class="confirm-delete" id="confirmDeleteBtn" data-i18n="deleteAllBtn">Delete All</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    var adminI18n = {
      en: {
        adminLogin: "Admin Login",
        loginSubtitle: "Enter password to access the admin panel",
        passwordLabel: "Password",
        loginBtn: "Login",
        loginError: "Incorrect password",
        adminPanel: "Admin Panel",
        logout: "Logout",
        totalPatients: "Total Patients",
        totalVisits: "Total Visits",
        quickActions: "Quick Actions",
        goToFrontP1: "Go to Front Page",
        viewHistory: "View Patient History",
        exportCsv: "Export All Data (CSV)",
        deleteAll: "Delete All Data",
        registeredPatients: "Registered Patients",
        thName: "Name",
        thDate: "Date",
        thAction: "Action",
        noPatients: "No patients yet",
        confirmDelete: "Are you sure you want to DELETE ALL patient data? This cannot be undone.",
        cancelBtn: "Cancel",
        deleteAllBtn: "Delete All",
        dataDeleted: "All data has been deleted successfully",
        csvExported: "CSV file exported successfully",
        patientDeleted: "Patient deleted successfully"
      },
      ar: {
        adminLogin: "\u062f\u062e\u0648\u0644 \u0627\u0644\u0645\u0633\u0624\u0648\u0644",
        loginSubtitle: "\u0623\u062f\u062e\u0644 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u0644\u0644\u0648\u0635\u0648\u0644 \u0644\u0644\u0648\u062d\u0629 \u0627\u0644\u0625\u062f\u0627\u0631\u064a\u0629",
        passwordLabel: "\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631",
        loginBtn: "\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644",
        loginError: "\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u063a\u064a\u0631 \u0635\u062d\u064a\u062d\u0629",
        adminPanel: "\u0644\u0648\u062d\u0629 \u0627\u0644\u062a\u062d\u0643\u0645",
        logout: "\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062e\u0631\u0648\u062c",
        totalPatients: "\u0625\u062c\u0645\u0627\u0644\u064a \u0627\u0644\u0645\u0631\u0636\u0649",
        totalVisits: "\u0625\u062c\u0645\u0627\u0644\u064a \u0627\u0644\u0632\u064a\u0627\u0631\u0627\u062a",
        quickActions: "\u0625\u062c\u0631\u0627\u0621\u0627\u062a \u0633\u0631\u064a\u0639\u0629",
        goToFrontP1: "\u0627\u0644\u0630\u0647\u0627\u0628 \u0644\u0644\u0635\u0641\u062d\u0629 \u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629",
        viewHistory: "\u0639\u0631\u0636 \u0633\u062c\u0644 \u0627\u0644\u0645\u0631\u0636\u0649",
        exportCsv: "\u062a\u0635\u062f\u064a\u0631 \u062c\u0645\u064a\u0639 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a (CSV)",
        deleteAll: "\u062d\u0630\u0641 \u062c\u0645\u064a\u0639 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a",
        registeredPatients: "\u0627\u0644\u0645\u0631\u0636\u0649 \u0627\u0644\u0645\u0633\u062c\u0644\u064a\u0646",
        thName: "\u0627\u0644\u0627\u0633\u0645",
        thDate: "\u0627\u0644\u062a\u0627\u0631\u064a\u062e",
        thAction: "\u0627\u0644\u0625\u062c\u0631\u0627\u0621",
        noPatients: "\u0644\u0627 \u064a\u0648\u062c\u062f \u0645\u0631\u0636\u0649 \u062d\u062a\u0649 \u0627\u0644\u0622\u0646",
        confirmDelete: "\u0647\u0644 \u0623\u0646\u062a \u0645\u062a\u0623\u0643\u062f \u0645\u0646 \u062d\u0630\u0641 \u062c\u0645\u064a\u0639 \u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0645\u0631\u0636\u0649\u061f \u0644\u0627 \u064a\u0645\u0643\u0646 \u0627\u0644\u062a\u0631\u0627\u062c\u0639 \u0639\u0646 \u0647\u0630\u0627.",
        cancelBtn: "\u0625\u0644\u063a\u0627\u0621",
        deleteAllBtn: "\u062d\u0630\u0641 \u0627\u0644\u0643\u0644",
        dataDeleted: "\u062a\u0645 \u062d\u0630\u0641 \u062c\u0645\u064a\u0639 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0628\u0646\u062c\u0627\u062d",
        csvExported: "\u062a\u0645 \u062a\u0635\u062f\u064a\u0631 \u0645\u0644\u0641 CSV \u0628\u0646\u062c\u0627\u062d",
        patientDeleted: "\u062a\u0645 \u062d\u0630\u0641 \u0627\u0644\u0645\u0631\u064a\u0636 \u0628\u0646\u062c\u0627\u062d"
      }
    };

    var currentLang = localStorage.getItem("mindrobot_lang") || "en";
    var API = window.location.origin;
    var adminPass = "mindrobot2025";
    var allPatients = [];

    function applyLang(lang) {
      var d = adminI18n[lang];
      if (!d) return;
      document.querySelectorAll("[data-i18n]").forEach(function(el) {
        var key = el.getAttribute("data-i18n");
        if (d[key]) el.textContent = d[key];
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
        var key = el.getAttribute("data-i18n-placeholder");
        if (d[key]) el.placeholder = d[key];
      });
    }

    applyLang(currentLang);
    document.addEventListener("mindrobot:langchange", function(e) {
      currentLang = e.detail.lang;
      applyLang(currentLang);
    });

    /* === LOGIN === */
    document.getElementById("loginBtn").addEventListener("click", function() {
      var pw = document.getElementById("passInput").value;
      if (pw === adminPass) {
        sessionStorage.setItem("mindrobot_admin", "true");
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminPanel").classList.add("active");
        loadPatients();
      } else {
        var err = document.getElementById("loginError");
        err.textContent = adminI18n[currentLang].loginError;
        err.style.display = "block";
        setTimeout(function() { err.style.display = "none"; }, 3000);
      }
    });

    document.getElementById("passInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    document.getElementById("logoutBtn").addEventListener("click", function() {
      sessionStorage.removeItem("mindrobot_admin");
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("adminPanel").classList.remove("active");
      document.getElementById("passInput").value = "";
    });

    if (sessionStorage.getItem("mindrobot_admin") === "true") {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("adminPanel").classList.add("active");
      loadPatients();
    }

    /* === PATIENTS === */
    function loadPatients() {
      fetch(API + "/api/patients")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          allPatients = Array.isArray(data) ? data : (data.patients || []);
          updateStats();
          renderTable();
        })
        .catch(function() {
          var local = JSON.parse(localStorage.getItem("mindrobot_patients") || "[]");
          allPatients = local;
          updateStats();
          renderTable();
        });
    }

    function updateStats() {
      document.getElementById("totalPatients").textContent = allPatients.length;
      var dates = allPatients.map(function(p) {
        return (p.visitDate || p.timestamp || "").substring(0, 10);
      });
      var unique = [];
      dates.forEach(function(d) { if (d && unique.indexOf(d) === -1) unique.push(d); });
      document.getElementById("totalVisits").textContent = unique.length;
    }

    function renderTable() {
      var body = document.getElementById("patientsBody");
      var empty = document.getElementById("patTableEmpty");
      if (!allPatients.length) {
        body.innerHTML = "";
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      allPatients.sort(function(a, b) {
        return new Date(b.visitDate || b.timestamp || 0) - new Date(a.visitDate || a.timestamp || 0);
      });
      var html = "";
      allPatients.forEach(function(p, idx) {
        var name = p.firstName || p.fullName || "--";
        var date = p.visitDate || p.timestamp || "";
        var dateStr = date ? new Date(date).toLocaleDateString(currentLang === "ar" ? "ar-EG" : "en-US") : "--";
        html += '<tr><td>' + name + '</td><td>' + dateStr + '</td><td><button class="pat-delete" data-idx="' + idx + '"><i class="fas fa-trash"></i></button></td></tr>';
      });
      body.innerHTML = html;
      body.querySelectorAll(".pat-delete").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var i = parseInt(this.getAttribute("data-idx"));
          var p = allPatients[i];
          if (p && p.id) {
            fetch(API + "/api/patients/" + p.id, { method: "DELETE" }).catch(function() {});
          }
          allPatients.splice(i, 1);
          localStorage.setItem("mindrobot_patients", JSON.stringify(allPatients));
          updateStats();
          renderTable();
          showToast(adminI18n[currentLang].patientDeleted);
        });
      });
    }

    /* === ACTIONS === */
    document.getElementById("btnHome").addEventListener("click", function() {
      window.location.href = "/Home/Home.html";
    });
    document.getElementById("btnHistory").addEventListener("click", function() {
      window.location.href = "/History/History.html";
    });
    document.getElementById("btnExport").addEventListener("click", function() {
      exportCsv();
    });
    document.getElementById("btnDeleteAll").addEventListener("click", function() {
      showConfirm();
    });

    /* === CSV EXPORT === */
    function exportCsv() {
      if (!allPatients.length) return;
      var headers = ["Name", "Age", "Gender", "Phone", "Email", "Blood Type", "Date"];
      var rows = allPatients.map(function(p) {
        return [
          (p.firstName || p.fullName || ""),
          (p.age || ""),
          (p.gender || ""),
          (p.phone || ""),
          (p.email || ""),
          (p.bloodType || ""),
          (p.visitDate || p.timestamp || "")
        ].join(",");
      });
      var csv = headers.join(",") + "\n" + rows.join("\n");
      var blob = new Blob([csv], { type: "text/csv" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "MindRobot_Patients.csv";
      a.click();
      URL.revokeObjectURL(url);
      showToast(adminI18n[currentLang].csvExported);
    }

    /* === CONFIRM DELETE ALL === */
    function showConfirm() {
      document.getElementById("confirmModal").classList.add("active");
    }
    function closeConfirm() {
      document.getElementById("confirmModal").classList.remove("active");
    }
    document.getElementById("confirmCancelBtn").addEventListener("click", closeConfirm);
    document.getElementById("confirmModal").addEventListener("click", function(e) {
      if (e.target === this) closeConfirm();
    });
    document.getElementById("confirmDeleteBtn").addEventListener("click", function() {
      closeConfirm();
      var deleted = [];
      allPatients.forEach(function(p) {
        if (p && p.id) {
          deleted.push(fetch(API + "/api/patients/" + p.id, { method: "DELETE" }).catch(function() {}));
        }
      });
      Promise.all(deleted).catch(function() {});
      allPatients = [];
      localStorage.removeItem("mindrobot_patients");
      updateStats();
      renderTable();
      showToast(adminI18n[currentLang].dataDeleted);
    });

    /* === TOAST === */
    function showToast(msg) {
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(function() { t.classList.remove("show"); }, 3000);
    }
  </script>
</body>
</html>
