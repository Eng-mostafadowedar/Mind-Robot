<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MindRobot — AI Chat</title>
    <meta name="color-scheme" content="dark light" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- الألوان الأساسية بتاعة MindRobot -->
    <link rel="stylesheet" href="../master.css" />

    <!-- الهيدر المشترك -->
    <link rel="stylesheet" href="../header/header.css" />

    <style>
        /* ═══════════════════════════════════════
           Chat Page Styles — MindRobot Theme
           ═══════════════════════════════════════ */

        body {
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-md) !important;
            color: var(--fg);
            background:
                radial-gradient(1200px 600px at 15% 10%, rgba(67,229,255,0.14), transparent 60%),
                radial-gradient(900px 500px at 85% 25%, rgba(155,123,255,0.14), transparent 60%),
                radial-gradient(900px 500px at 50% 90%, rgba(46,229,157,0.10), transparent 60%),
                linear-gradient(180deg, var(--bg0), var(--bg1));
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ الـ App Shell ═══ */
        .app-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ═══ Force header to full width — same as other pages ═══ */
        .app-shell > .topbar,
        .app-shell > .workspace-nav {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
        }

        /* ═══ شريط حالة الشات ═══ */
        .chat-status-bar {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--stroke);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
            min-height: 44px;
        }

        #statusText {
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-sm) !important;
            color: var(--muted);
        }

        #thinkingIndicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.3s;
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: var(--warn);
            border-radius: 50%;
            animation: thinkingBounce 1.4s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(1) { animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        .thinking-text {
            color: var(--warn);
            font-size: var(--app-fz-md) !important;
            font-weight: 600;
            font-family: var(--app-font) !important;
        }

        #listeningIndicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.3s;
        }

        .listening-dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            animation: listeningPulse 1.5s infinite;
            box-shadow: 0 0 8px rgba(67, 229, 255, 0.4);
        }

        .listening-text {
            color: var(--accent);
            font-size: var(--app-fz-sm) !important;
            font-family: var(--app-font) !important;
            font-weight: 600;
        }

        /* ═══ حاوية الرسائل ═══ */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(67, 229, 255, 0.15);
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(67, 229, 255, 0.30);
        }

        /* ═══ الرسائل ═══ */
        .message {
            margin-bottom: 14px;
            animation: slideIn 0.3s ease-out;
        }

        .message-label {
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-xs) !important;
            color: var(--muted);
            margin-bottom: 4px;
            padding: 0 6px;
            font-weight: 600;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            max-width: 85%;
            line-height: 1.7;
            font-size: var(--app-fz-md) !important;
            word-wrap: break-word;
            font-family: var(--app-font) !important;
        }

        /* رسالة المستخدم */
        .message.user {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(67,229,255,0.25), rgba(155,123,255,0.20));
            color: var(--fg);
            border: 1px solid rgba(67, 229, 255, 0.25);
            border-start-start-radius: 4px;
            margin-inline-start: auto;
        }

        /* رسالة الروبوت */
        .message.assistant {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .message.assistant .message-bubble {
            background: var(--panel);
            color: var(--fg);
            border: 1px solid var(--stroke);
            border-start-end-radius: 4px;
            margin-inline-end: auto;
            backdrop-filter: blur(16px);
        }

        /* رسالة النظام */
        .message.system {
            text-align: center;
            padding: 6px 12px;
        }

        .message.system .message-bubble {
            background: transparent;
            color: var(--muted);
            font-size: var(--app-fz-sm) !important;
            border: none;
            padding: 4px;
        }

        /* ═══ منطقة الإدخال ═══ */
        .input-area {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--stroke);
            padding: 14px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--stroke);
            border-radius: 24px;
            padding: 14px 22px;
            color: var(--fg);
            font-size: var(--app-fz-md) !important;
            font-family: var(--app-font) !important;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #messageInput:focus {
            border-color: rgba(67, 229, 255, 0.50);
            box-shadow: 0 0 0 3px rgba(67, 229, 255, 0.08);
        }

        #messageInput::placeholder {
            color: rgba(169, 183, 223, 0.40);
        }

        .chat-btn {
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        #sendBtn {
            background: linear-gradient(135deg, rgba(67,229,255,0.80), rgba(155,123,255,0.80));
            color: #0b1022;
            border: 1px solid rgba(255,255,255,0.15);
        }

        #sendBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 18px rgba(67, 229, 255, 0.40);
        }

        #sendBtn:disabled {
            background: rgba(255,255,255,0.08);
            border-color: var(--stroke);
            color: var(--muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #micBtn {
            background: rgba(255, 61, 113, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 61, 113, 0.30);
            position: relative;
        }

        #micBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 18px rgba(255, 61, 113, 0.40);
        }

        #micBtn.active {
            animation: micPulse 1.5s infinite;
            box-shadow: 0 0 24px rgba(67, 229, 255, 0.60);
            background: rgba(67, 229, 255, 0.20);
            color: var(--accent);
            border-color: rgba(67, 229, 255, 0.40);
        }

        #micBtn.recording {
            animation: micPulse 1.5s infinite;
            box-shadow: 0 0 24px rgba(255, 61, 113, 0.60);
            background: rgba(255, 61, 113, 0.25);
            color: var(--danger);
            border-color: rgba(255, 61, 113, 0.50);
        }

        /* ═══ Continuous Banner ═══ */
        #continuousBanner {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(46, 229, 157, 0.08);
            border-bottom: 1px solid rgba(46, 229, 157, 0.15);
            color: var(--accent);
            font-size: var(--app-fz-sm) !important;
            font-family: var(--app-font) !important;
            font-weight: 600;
            flex-shrink: 0;
        }

        #continuousBanner.active {
            display: flex;
        }

        #continuousBanner .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: listeningPulse 1.5s infinite;
        }

        /* ═══ فاهم Button ═══ */
        #understoodBtn {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            background: rgba(46, 229, 157, 0.10);
            border: 1px solid rgba(46, 229, 157, 0.25);
            color: var(--accent);
            border-radius: 24px;
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-sm) !important;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 8px auto;
        }

        #understoodBtn:hover {
            background: rgba(46, 229, 157, 0.18);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 229, 157, 0.15);
        }

        /* ═══ Continuous Mode Button ═══ */
        #continuousBtn {
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            flex-shrink: 0;
            background: rgba(46, 229, 157, 0.10);
            color: var(--accent);
            border: 1px solid rgba(46, 229, 157, 0.25);
        }

        #continuousBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 18px rgba(46, 229, 157, 0.40);
        }

        #continuousBtn.active {
            animation: micPulse 1.5s infinite;
            box-shadow: 0 0 24px rgba(46, 229, 157, 0.60);
            background: rgba(46, 229, 157, 0.25);
            color: var(--accent);
            border-color: rgba(46, 229, 157, 0.50);
        }

        /* ═══ نافذة تأكيد الـ STT ═══ */
        .stt-confirm-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(7, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        .stt-confirm-box {
            background: var(--panel);
            border: 1px solid var(--stroke);
            border-radius: 20px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out;
        }

        .stt-confirm-box .title {
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-lg) !important;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .stt-confirm-box input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--stroke);
            background: rgba(255,255,255,0.06);
            color: var(--fg);
            font-size: var(--app-fz-md) !important;
            font-family: var(--app-font) !important;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }

        .stt-confirm-box input:focus {
            border-color: rgba(67, 229, 255, 0.50);
            box-shadow: 0 0 0 3px rgba(67, 229, 255, 0.08);
        }

        .stt-confirm-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .stt-confirm-btns button {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: var(--app-font) !important;
            font-size: var(--app-fz-sm) !important;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .stt-btn-send {
            background: linear-gradient(135deg, rgba(67,229,255,0.80), rgba(155,123,255,0.80));
            color: #0b1022;
            border-color: rgba(255,255,255,0.15);
        }

        .stt-btn-send:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67, 229, 255, 0.20);
        }

        .stt-btn-retry {
            background: rgba(255, 61, 113, 0.12);
            color: var(--danger);
            border-color: rgba(255, 61, 113, 0.30);
        }

        .stt-btn-retry:hover {
            background: rgba(255, 61, 113, 0.20);
        }

        .stt-btn-cancel {
            background: rgba(255,255,255,0.06);
            color: var(--muted);
            border-color: var(--stroke);
        }

        .stt-btn-cancel:hover {
            background: rgba(255,255,255,0.10);
            color: var(--fg);
        }

        /* ═══ Responsive ═══ */
        @media (max-width: 900px) {
            .chat-container { padding: 16px 16px; }
            .input-area { padding: 12px 14px; }
        }

        @media (max-width: 640px) {
            .chat-container { padding: 12px 10px; }
            .message-bubble { font-size: var(--app-fz-md) !important; padding: 10px 14px; max-width: 90%; }
            .chat-btn { width: 44px; height: 44px; font-size: 16px; }
            #messageInput { padding: 10px 16px; }
            .chat-status-bar { padding: 8px 14px; }
            #continuousBtn { width: 44px; height: 44px; font-size: 16px; }
        }

        /* ═══ Reduced Motion ═══ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ═══ الأنيميشنز ═══ */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes thinkingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes listeningPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(67, 229, 255, 0.4); }
            50% { box-shadow: 0 0 28px rgba(67, 229, 255, 0.8); }
        }
    </style>
</head>
<body>

    <div class="app-shell" id="app">
        <!-- الهيدر والنافبار هيتبحثوا تلقائياً عن #app أو body عن طريق header.js -->

        <!-- ═══ شريط حالة الشات ═══ -->
        <div class="chat-status-bar">
            <div id="listeningIndicator">
                <div class="listening-dot"></div>
                <span class="listening-text" data-chat-i18n="listening">Listening...</span>
            </div>
            <div id="thinkingIndicator">
                <div class="thinking-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span class="thinking-text" data-chat-i18n="thinking">Thinking...</span>
            </div>
            <span id="statusText">Loading...</span>
        </div>

        <!-- ═══ Continuous Mode Banner ═══ -->
        <div id="continuousBanner">
            <div class="pulse-dot"></div>
            <span data-chat-i18n="continuousActive">Continuous conversation active</span>
        </div>

        <!-- ═══ حاوية الرسائل ═══ (NO static welcome section — clean chat area) -->
        <div class="chat-container" id="chatMessages">
        </div>

        <!-- ═══ فاهم Button (appears after robot reply) ═══ -->
        <button id="understoodBtn" data-chat-i18n="understood">فاهم</button>

        <!-- ═══ منطقة الإدخال ═══ -->
        <div class="input-area">
            <input type="text" id="messageInput" data-chat-i18n-placeholder="inputPlaceholder" placeholder="Type your message..." autocomplete="off" />
            <button class="chat-btn" id="sendBtn" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
            <button class="chat-btn" id="micBtn" title="Microphone">
                <i class="fas fa-microphone"></i>
            </button>
            <button id="continuousBtn" title="Continuous Mode">
                <i class="fas fa-infinity"></i>
            </button>
        </div>
    </div>

    <!-- الهيدر المشترك (cache-bust v22.0) -->
    <script src="../header/header.js?v=22.0"></script>
    <!-- الشات (cache-bust v22.0) -->
    <script src="Chat.js?v=22.0"></script>

</body>
</html>
